    <style>body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #ffffff;
      }

      #main-canvas {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .aroll-container {
        position: absolute;
        overflow: hidden;
        border-radius: 12px;
        background: #000;
      }

      #aroll-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Background Shapes Layer */
      #bg-shapes {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

[data-composition-id="graphics-comp"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        font-family: "Futura", "DIN Alternate", "Arial Black", sans-serif;
        overflow: hidden;
      }

      /* Common Styles */
      [data-composition-id="graphics-comp"] .intro-container,
      [data-composition-id="graphics-comp"] .stat-container,
      [data-composition-id="graphics-comp"] .outro-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
      }

      [data-composition-id="graphics-comp"] .stat-number {
        font-size: 200px;
        font-weight: 900;
        line-height: 1;
        z-index: 2;
      }

      [data-composition-id="graphics-comp"] .stat-subtext {
        position: absolute;
        font-size: 60px;
        font-weight: 900;
        z-index: 3;
        text-align: center;
        width: 800px;
      }

      /* Intro Styles - Centered behind A-roll (A-roll is full screen) */
      [data-composition-id="graphics-comp"] .black-circle {
        width: 800px;
        height: 800px;
        background-color: #000000;
        border-radius: 50%;
        position: absolute;
      }

      [data-composition-id="graphics-comp"] .intro-text {
        font-size: 100px;
        font-weight: 900;
        color: #d0021b;
        z-index: 2;
        text-align: center;
        width: 1000px;
      }

      /* Stat 1 Styles (Left side) - A-roll is at x:700 */
      [data-composition-id="graphics-comp"] .stat-1 .vermillion-square {
        width: 600px;
        height: 600px;
        background-color: #d0021b;
        position: absolute;
        left: 50px;
