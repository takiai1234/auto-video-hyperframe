</script>
    <style>body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #ffffff;
        font-family: "Nunito", sans-serif;
      }

      #main-composition {
        width: 1920px;
        height: 1080px;
        position: relative;
      }

      #bg-comp,
      #aroll-comp,
      #intro-comp,
      #stats-comp,
      #captions-comp {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #bg-comp {
        z-index: 1;
      }

      #aroll-comp {
        z-index: 10;
      }

      #intro-comp {
        z-index: 100;
      }

      #stats-comp {
        z-index: 150;
      }

      #captions-comp {
        z-index: 200;
      }

      #aroll-container {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 0;
      }

      #short_mag_cut {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        border: 8px solid #ffffff;
      }

      #background-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        z-index: 0;
      }

[data-composition-id="intro"] .intro-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      [data-composition-id="intro"] .title {
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        font-size: 180px;
        color: #ff2d8a; /* Hot Pink */
        text-transform: uppercase;
        transform: rotate(-5deg); /* Tilted 5 degrees */
        margin: 0;
        padding: 20px;
        /* Layered offset shadow for depth without suffocating letterforms */
        filter: drop-shadow(8px 8px 0 #ffffff) drop-shadow(15px 15px 0 rgba(0, 0, 0, 0.1));
        opacity: 0;
        scale: 0;
      }
    


      [data-composition-id="captions"] {
        width: 1920px;
        height: 1080px;
        pointer-events: none;
      }

      [data-composition-id="captions"] #captions-container {
        position: absolute;
        bottom: 100px; /* Position in bottom 1/3 */
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
