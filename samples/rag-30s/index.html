<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG - Test 30s</title>
    <style>
      :root {
        --bg: #03070f;
        --panel: #0d1b2a;
        --line: #2a3f5a;
        --muted: #9fb3c8;
        --text: #e6edf5;
        --amber: #ffc300;
        --teal: #2ec4b6;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background: var(--bg);
        overflow: hidden;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
      }
      #stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        background:
          radial-gradient(900px 600px at 50% 38%, rgba(20, 60, 110, 0.35), transparent 70%),
          radial-gradient(circle at center, rgba(255, 255, 255, 0.06) 1px, transparent 1px) 0 0 / 46px 46px,
          var(--bg);
        overflow: hidden;
      }
      #bg-glow {
        position: absolute;
        width: 1100px;
        height: 1100px;
        left: 410px;
        top: -120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(46, 196, 182, 0.18), transparent 65%);
        filter: blur(20px);
        z-index: 0;
      }
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 110px 160px;
        opacity: 0;
        z-index: 5;
      }
      .kicker {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--teal);
        margin-bottom: 26px;
      }
      .heading {
        font-size: 78px;
        font-weight: 800;
        letter-spacing: -1px;
        text-align: center;
        margin: 0;
      }
      .accent {
        color: var(--amber);
      }
      .accent-teal {
        color: var(--teal);
      }

      /* Scene 0 */
      #s0_badge {
        width: 170px;
        height: 170px;
        border-radius: 30px;
        background: linear-gradient(150deg, #16324f, #0a1626);
        border: 1px solid var(--line);
        box-shadow: 0 30px 80px rgba(46, 196, 182, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 66px;
        font-weight: 900;
        color: var(--amber);
        margin-bottom: 40px;
      }
      #s0_title {
        font-size: 156px;
        font-weight: 900;
        letter-spacing: -4px;
        margin: 0;
        background: linear-gradient(120deg, #ffffff, #9fb3c8);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #s0_sub {
        font-size: 38px;
        font-weight: 600;
        color: var(--teal);
        margin-top: 6px;
      }

      /* Scene 1 - formula */
      .formula {
        display: flex;
        align-items: center;
        gap: 30px;
        margin-top: 60px;
      }
      .pill {
        font-size: 38px;
        font-weight: 700;
        padding: 26px 40px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .pill.r {
        color: var(--teal);
        border-color: rgba(46, 196, 182, 0.55);
      }
      .pill.g {
        color: var(--amber);
        border-color: rgba(255, 195, 0, 0.5);
      }
      .op {
        font-size: 60px;
        font-weight: 300;
        color: var(--muted);
      }
      .pill.result {
        font-size: 46px;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(120deg, #16324f, #0a1626);
      }

      /* Scene 2 - flow */
      .flow {
        display: flex;
        align-items: center;
        gap: 22px;
        margin-top: 60px;
      }
      .fbox {
        width: 280px;
        min-height: 190px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 26px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .fbox.db {
        border-color: rgba(46, 196, 182, 0.6);
      }
      .fbox .ic {
        font-size: 58px;
      }
      .fbox .t {
        font-size: 28px;
        font-weight: 700;
        margin-top: 16px;
      }
      .arrow {
        font-size: 46px;
        color: var(--amber);
        font-weight: 300;
      }

      /* Scene 3 - outro */
      #s3_final {
        font-size: 70px;
        font-weight: 900;
        letter-spacing: -1px;
        text-align: center;
      }
      #s3_thanks {
        margin-top: 22px;
        font-size: 32px;
        color: var(--muted);
      }

      #wipe {
        position: absolute;
        inset: -10% -20%;
        width: 140%;
        height: 120%;
        background: var(--teal);
        z-index: 50;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="rag30" data-width="1920" data-height="1080" data-start="0" data-duration="30">
      <div id="bg-glow"></div>

      <!-- SCENE 0 -->
      <section class="scene" id="scene-0">
        <div id="s0_badge">RAG</div>
        <h1 id="s0_title">RAG</h1>
        <div id="s0_sub">Retrieval-Augmented Generation</div>
      </section>

      <!-- SCENE 1 -->
      <section class="scene" id="scene-1">
        <div class="kicker">Ý tưởng cốt lõi</div>
        <h2 class="heading">RAG làm gì?</h2>
        <div class="formula">
          <div class="pill r" id="s1_p1">🔎 Retrieval</div>
          <div class="op" id="s1_op1">+</div>
          <div class="pill g" id="s1_p2">✍️ Generation</div>
          <div class="op" id="s1_op2">=</div>
          <div class="pill result" id="s1_res">RAG</div>
        </div>
      </section>

      <!-- SCENE 2 -->
      <section class="scene" id="scene-2">
        <div class="kicker">Quy trình</div>
        <h2 class="heading">3 bước</h2>
        <div class="flow">
          <div class="fbox" id="s2_b1"><div class="ic">❓</div><div class="t">Câu hỏi</div></div>
          <div class="arrow" id="s2_a1">→</div>
          <div class="fbox db" id="s2_b2"><div class="ic">🔎</div><div class="t">Tìm tài liệu</div></div>
          <div class="arrow" id="s2_a2">→</div>
          <div class="fbox" id="s2_b3"><div class="ic">🤖</div><div class="t">LLM trả lời</div></div>
        </div>
      </section>

      <!-- SCENE 3 -->
      <section class="scene" id="scene-3">
        <div id="s3_final">RAG = <span class="accent-teal">Tìm kiếm</span> + <span class="accent">Sinh văn bản</span></div>
        <div id="s3_thanks">Cảm ơn bạn đã xem 🎬</div>
      </section>

      <div id="wipe"></div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });
          const TOTAL = 30;
          const cycle = 4;

          tl.to(
            "#bg-glow",
            {
              opacity: 0.55,
              scale: 1.12,
              duration: cycle / 2,
              ease: "sine.inOut",
              yoyo: true,
              repeat: Math.floor(TOTAL / cycle) - 1,
              transformOrigin: "center center",
            },
            0,
          );

          function transition(t, prevSel, nextSel, color) {
            tl.set("#wipe", { backgroundColor: color, xPercent: -130, skewX: -10, opacity: 1 }, t);
            tl.to("#wipe", { xPercent: 0, duration: 0.4, ease: "power2.in", overwrite: "auto" }, t);
            if (prevSel) tl.set(prevSel, { opacity: 0 }, t + 0.4);
            tl.set(nextSel, { opacity: 1 }, t + 0.4);
            tl.to("#wipe", { xPercent: 130, duration: 0.45, ease: "power2.out", overwrite: "auto" }, t + 0.42);
            tl.set("#wipe", { opacity: 0 }, t + 0.9);
          }

          // SCENE 0 (0 → 6.8)
          tl.set("#scene-0", { opacity: 1 }, 0);
          tl.from("#s0_badge", { scale: 0, rotation: -20, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, 0.3);
          tl.from("#s0_title", { y: 70, opacity: 0, duration: 0.8, ease: "expo.out" }, 0.8);
          tl.from("#s0_sub", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, 1.4);

          // SCENE 1 (7.2 → 14)
          transition(6.8, "#scene-0", "#scene-1", "#2ec4b6");
          tl.from("#scene-1 .kicker", { y: -24, opacity: 0, duration: 0.5, ease: "power2.out" }, 7.4);
          tl.from("#scene-1 .heading", { y: 40, opacity: 0, duration: 0.6, ease: "expo.out" }, 7.6);
          tl.from("#s1_p1", { scale: 0.6, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, 8.1);
          tl.from("#s1_op1", { opacity: 0, duration: 0.3, ease: "none" }, 8.4);
          tl.from("#s1_p2", { scale: 0.6, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, 8.6);
          tl.from("#s1_op2", { opacity: 0, duration: 0.3, ease: "none" }, 8.9);
          tl.from("#s1_res", { scale: 0, rotation: 8, opacity: 0, duration: 0.6, ease: "back.out(2)" }, 9.1);

          // SCENE 2 (14.5 → 23.5)
          transition(14.0, "#scene-1", "#scene-2", "#ffc300");
          tl.from("#scene-2 .kicker", { y: -24, opacity: 0, duration: 0.5, ease: "power2.out" }, 14.6);
          tl.from("#scene-2 .heading", { y: 40, opacity: 0, duration: 0.6, ease: "expo.out" }, 14.8);
          const boxes = ["#s2_b1", "#s2_b2", "#s2_b3"];
          const arrows = ["#s2_a1", "#s2_a2"];
          boxes.forEach((b, i) => {
            tl.from(b, { y: 50, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 15.3 + i * 0.7);
            if (i < arrows.length) {
              tl.from(arrows[i], { scale: 0, opacity: 0, duration: 0.35, ease: "power2.out" }, 15.75 + i * 0.7);
            }
          });

          // SCENE 3 (24.1 → 30)
          transition(23.5, "#scene-2", "#scene-3", "#2ec4b6");
          tl.from("#s3_final", { scale: 0.8, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, 24.3);
          tl.from("#s3_thanks", { y: 20, opacity: 0, duration: 0.6, ease: "power2.out" }, 25.1);
          tl.to("#scene-3", { opacity: 0, duration: 1.0, ease: "power2.in" }, 28.8);

          window.__timelines = window.__timelines || {};
          window.__timelines["rag30"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
